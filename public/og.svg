<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SPM AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16267e"/>
      <stop offset="0.55" stop-color="#1f47df"/>
      <stop offset="1" stop-color="#2f74ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#27d3ac" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#27d3ac" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand row -->
  <g transform="translate(80,72)">
    <rect width="64" height="64" rx="15" fill="#ffffff" opacity="0.1"/>
    <g font-family="'Arial Black',Arial,sans-serif" font-weight="900" text-anchor="middle">
      <text x="32" y="30" font-size="22" fill="#ffffff" letter-spacing="-1.5">SPM</text>
      <text x="28" y="54" font-size="22" fill="#27d3ac" letter-spacing="-1">AI</text>
    </g>
    <text x="84" y="42" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="30" fill="#ffffff">SPM<tspan fill="#27d3ac">AI</tspan></text>
  </g>

  <!-- headline -->
  <g font-family="'Arial Black','Arial Narrow',Arial,sans-serif" font-weight="900">
    <text x="80" y="285" font-size="78" fill="#ffffff" letter-spacing="-2">Skor <tspan fill="#0b1020"><tspan>A+</tspan></tspan> SPM anda —</text>
    <text x="80" y="375" font-size="78" fill="#ffffff" letter-spacing="-2">dengan <tspan fill="#27d3ac">cikgu AI</tspan>.</text>
  </g>
  <!-- highlighter behind A+ -->
  <rect x="248" y="222" width="118" height="74" rx="10" fill="#FFD23F" transform="rotate(-1.5 307 259)"/>
  <text x="80" y="285" font-family="'Arial Black','Arial Narrow',Arial,sans-serif" font-weight="900" font-size="78" letter-spacing="-2" fill="#ffffff">Skor <tspan fill="#0b1020">A+</tspan> SPM anda —</text>

  <!-- subtext -->
  <text x="82" y="438" font-family="Arial,sans-serif" font-size="30" fill="#c9d6ff">Setiap kertas. Pemarkahan AI serta-merta. Tutor peribadi.</text>

  <!-- free pill -->
  <g transform="translate(82,478)">
    <rect width="560" height="60" rx="30" fill="#27d3ac"/>
    <text x="30" y="40" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="26" fill="#06281f">PERCUMA untuk 200 pelajar pertama</text>
  </g>

  <!-- footer note -->
  <text x="82" y="582" font-family="Arial,sans-serif" font-size="22" fill="#9fb4ff">Pertama di Malaysia · Bahasa Melayu &amp; English</text>

  <!-- decorative paper + check, right side -->
  <g transform="translate(905,150)" opacity="0.97">
    <rect x="0" y="0" width="210" height="270" rx="18" fill="#ffffff"/>
    <path d="M170 0 L210 40 H178 A8 8 0 0 1 170 32 Z" fill="#d7e0f2"/>
    <g fill="#1e3a8a">
      <rect x="28" y="60" width="120" height="16" rx="8"/>
      <rect x="28" y="98" width="150" height="16" rx="8"/>
      <rect x="28" y="136" width="150" height="16" rx="8"/>
      <rect x="28" y="174" width="100" height="16" rx="8"/>
    </g>
    <circle cx="186" cy="246" r="46" fill="#27d3ac" stroke="#ffffff" stroke-width="7"/>
    <path d="M165 246 l14 15 27 -31" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

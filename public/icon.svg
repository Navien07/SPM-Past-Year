<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="SPM AI">
  <defs>
    <linearGradient id="tile" x1="0.05" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#1c34b4"/>
      <stop offset="0.5" stop-color="#1f47df"/>
      <stop offset="1" stop-color="#2f74ff"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#0a1566" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#tile)"/>

  <!-- Wordmark -->
  <g font-family="'Arial Black','Arial Narrow',Arial,sans-serif" font-weight="900" text-anchor="middle">
    <text x="252" y="246" font-size="170" fill="#ffffff" letter-spacing="-5">SPM</text>
    <text x="168" y="412" font-size="150" fill="#27d3ac" letter-spacing="-3">AI</text>
  </g>

  <!-- Past-year-paper sheet with folded corner -->
  <g filter="url(#soft)">
    <path d="M312 286 H452 L486 320 V470 A8 8 0 0 1 478 478 H312 A8 8 0 0 1 304 470 V294 A8 8 0 0 1 312 286 Z" fill="#ffffff"/>
    <path d="M452 286 L486 320 H460 A8 8 0 0 1 452 312 Z" fill="#d7e0f2"/>
    <!-- text lines -->
    <g fill="#1e3a8a">
      <rect x="392" y="338" width="74" height="15" rx="7.5"/>
      <rect x="346" y="372" width="120" height="15" rx="7.5"/>
      <rect x="346" y="404" width="120" height="15" rx="7.5"/>
      <rect x="346" y="436" width="86" height="15" rx="7.5"/>
    </g>
  </g>

  <!-- Open book (teal) cradling the sheet -->
  <path d="M286 452 C330 432 372 438 392 458 C412 438 454 432 498 452 L498 470 C454 452 412 458 392 478 C372 458 330 452 286 470 Z" fill="#27d3ac"/>

  <!-- Teal check badge -->
  <circle cx="452" cy="452" r="42" fill="#27d3ac" stroke="#ffffff" stroke-width="6"/>
  <path d="M434 452 l12 13 24 -28" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

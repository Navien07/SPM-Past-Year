<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="SPM AI">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#2740b8"/>
      <stop offset="0.55" stop-color="#15257f"/>
      <stop offset="1" stop-color="#0a1566"/>
    </linearGradient>
    <linearGradient id="ai" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#tile)"/>

  <!-- Wordmark -->
  <g font-family="'Arial Black','Arial Narrow',Arial,sans-serif" font-weight="900" text-anchor="middle">
    <text x="248" y="230" font-size="172" fill="#ffffff" letter-spacing="-4">SPM</text>
    <text x="180" y="392" font-size="150" fill="url(#ai)" letter-spacing="-2">Ai</text>
  </g>

  <!-- AI sparkle -->
  <path d="M300 250 l13 33 33 13 -33 13 -13 33 -13-33 -33-13 33-13 Z" fill="#5b8cff"/>

  <!-- Past-year-papers sheet (behind + front for depth) -->
  <g transform="rotate(7 392 392)" filter="url(#soft)">
    <rect x="306" y="300" width="190" height="196" rx="16" fill="#dbe3f4" opacity="0.7"/>
    <rect x="296" y="288" width="190" height="196" rx="16" fill="#ffffff"/>
    <!-- header lines -->
    <rect x="320" y="312" width="150" height="13" rx="6.5" fill="#1e3a8a"/>
    <rect x="320" y="333" width="120" height="13" rx="6.5" fill="#1e3a8a"/>
    <!-- MCQ rows -->
    <g fill="none" stroke="#9aa6c4" stroke-width="3.5">
      <circle cx="326" cy="372" r="9"/>
      <circle cx="326" cy="398" r="9"/>
      <circle cx="326" cy="424" r="9"/>
      <circle cx="326" cy="450" r="9"/>
    </g>
    <g fill="#c7d0e6">
      <rect x="346" y="367" width="120" height="9" rx="4.5"/>
      <rect x="346" y="393" width="120" height="9" rx="4.5"/>
      <rect x="346" y="419" width="86" height="9" rx="4.5"/>
      <rect x="346" y="445" width="86" height="9" rx="4.5"/>
    </g>
    <!-- gradient check -->
    <circle cx="446" cy="438" r="34" fill="none" stroke="url(#check)" stroke-width="9"/>
    <path d="M430 438 l11 12 22 -26" fill="none" stroke="url(#check)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
